name: Daily Check

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  daily-check:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 3️⃣ Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 4️⃣ Build project
      - name: Build project
        run: mvn package -DskipTests

      # 5️⃣ Run bot
      - name: Run bot
        env:
          DISCORD_CHANNEL_GAMES: ${{ secrets.DISCORD_CHANNEL_GAMES }}
          DISCORD_CHANNEL_NEWS: ${{ secrets.DISCORD_CHANNEL_NEWS }}
          DISCORD_TOKENS: ${{ secrets.DISCORD_TOKENS }}
          GAME_LOG_PATH: ${{ secrets.GAME_LOG_PATH }}
          NEWS_LOG_PATH: ${{ secrets.NEWS_LOG_PATH }}
          STEAM_URL: ${{ secrets.STEAM_URL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

        run: java -jar target/DiscordBot-1.0-SNAPSHOT.jar

      # 6️⃣ Optional: Show log content
      - name: Show log file
        run: cat games.json || echo "games.json not created"

      # 7️⃣ Commit log
      - name: Commit log
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add games.json
          git commit -m "Update daily log" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
